<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none';" />
  <title>New Tab</title>
  <link rel="stylesheet" href="../styles/ui.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>
  <main class="home">
    <section class="hero">
      <div class="meta">
        <span id="greeting-text">Good afternoon</span>
        <span class="sep">·</span>
        <span id="date-display">SATURDAY, JULY 5</span>
      </div>

      <div class="clock" id="time-display">00:00</div>

      <form class="search" id="search-form" autocomplete="off">
        <svg class="search-icon" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="10.5" cy="10.5" r="6.5"/><line x1="15.5" y1="15.5" x2="21" y2="21"/>
        </svg>
        <input class="search-input" id="search-input" type="text" placeholder="Search or enter a URL" spellcheck="false">
      </form>
    </section>
  </main>

  <footer class="wordmark" aria-hidden="true">
    <span class="wm-star">✦</span> NORTHSTAR
  </footer>

  <script src="newtab.js"></script>
</body>
</html>
