<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none';" />
  <title>Bruno - API Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bruno-outer">

    <!-- Drag handle (sits at the LEFT edge, overlaps the browser) -->
    <div id="resize-handle"></div>

    <div class="bruno-container">

      <!-- ===== LEFT SIDEBAR ===== -->
      <div class="sidebar">
        <div class="sidebar-top-actions">
          <button id="open-collection-btn" class="btn-sidebar-action" title="Open existing collection">Open</button>
          <button id="new-collection-btn"  class="btn-sidebar-action" title="Create new collection">New</button>
          <div style="flex:1"></div>
          <button id="bruno-close-btn" class="btn-icon" title="Close Bruno">✕</button>
        </div>

        <!-- Collections tree -->
        <div id="collections-tree" class="collections-list">
          <div class="empty-state">Open or create a collection to get started</div>
        </div>

        <!-- Environment bar -->
        <div class="env-bar">
          <span class="env-label">ENV</span>
          <select id="env-select" class="env-select">
            <option value="">No Environment</option>
          </select>
          <button id="env-manage-btn" class="btn-icon" title="Manage Environments">⚙</button>
        </div>
      </div>

      <!-- ===== MAIN AREA ===== -->
      <div class="main-area">

        <!-- Empty / no-request state -->
        <div id="no-request-state" class="no-request-state">
          <p>Select a request from the sidebar<br>or create a new one</p>
        </div>

        <!-- Request editor (hidden until a request is selected) -->
        <div id="request-editor" class="request-editor hidden">

          <div class="toolbar">
            <span id="request-breadcrumb" class="request-breadcrumb"></span>
            <div class="toolbar-actions">
              <button id="save-btn" class="btn-small">Save</button>
            </div>
          </div>

          <div class="request-builder">
            <div class="rb-row">
              <select id="request-method">
                <option>GET</option>
                <option>POST</option>
                <option>PUT</option>
                <option>PATCH</option>
                <option>DELETE</option>
                <option>HEAD</option>
                <option>OPTIONS</option>
              </select>
              <input type="text" id="request-url" placeholder="https://api.example.com/endpoint">
              <button id="send-btn" class="btn-send">Send</button>
            </div>
          </div>

          <div class="request-tabs">
            <button class="req-tab active" data-tab="body">Body</button>
            <button class="req-tab" data-tab="params">Params</button>
            <button class="req-tab" data-tab="headers">Headers</button>
            <button class="req-tab" data-tab="auth">Auth</button>
            <button class="req-tab" data-tab="script">Script</button>
            <button class="req-tab" data-tab="assert">Assert</button>
            <button class="req-tab" data-tab="docs">Docs</button>
          </div>

          <div class="content-and-response">
            <div class="tab-content-area">

              <div class="tab-pane active" id="body-pane">
                <textarea id="body-textarea" placeholder="Request body (JSON, text, etc.)"></textarea>
              </div>

              <div class="tab-pane" id="params-pane">
                <div class="kv-editor" id="params-editor">
                  <div class="kv-header">
                    <span class="kv-col-check"></span>
                    <span class="kv-col-key">Key</span>
                    <span class="kv-col-val">Value</span>
                    <span class="kv-col-del"></span>
                  </div>
                  <div class="kv-rows"></div>
                  <button class="kv-add-btn">+ Add Parameter</button>
                </div>
              </div>

              <div class="tab-pane" id="headers-pane">
                <div class="kv-editor" id="headers-editor">
                  <div class="kv-header">
                    <span class="kv-col-check"></span>
                    <span class="kv-col-key">Key</span>
                    <span class="kv-col-val">Value</span>
                    <span class="kv-col-del"></span>
                  </div>
                  <div class="kv-rows"></div>
                  <button class="kv-add-btn">+ Add Header</button>
                </div>
              </div>

              <div class="tab-pane" id="auth-pane">
                <div class="auth-panel">
                  <div class="auth-row">
                    <label class="auth-label">Type</label>
                    <select id="auth-type">
                      <option value="none">No Auth</option>
                      <option value="bearer">Bearer Token</option>
                      <option value="basic">Basic Auth</option>
                      <option value="apikey">API Key</option>
                      <option value="oauth2">OAuth 2.0</option>
                      <option value="digest">Digest Auth</option>
                    </select>
                  </div>

                  <!-- Bearer -->
                  <div id="auth-bearer-fields" class="auth-fields hidden">
                    <label class="auth-label">Token</label>
                    <input type="text" id="auth-token" class="auth-input" placeholder="Bearer token">
                  </div>

                  <!-- Basic -->
                  <div id="auth-basic-fields" class="auth-fields hidden">
                    <label class="auth-label">Username</label>
                    <input type="text" id="auth-username" class="auth-input" placeholder="Username">
                    <label class="auth-label">Password</label>
                    <input type="password" id="auth-password" class="auth-input" placeholder="Password">
                  </div>

                  <!-- API Key -->
                  <div id="auth-apikey-fields" class="auth-fields hidden">
                    <label class="auth-label">Key</label>
                    <input type="text" id="auth-apikey-key" class="auth-input" placeholder="Header or query param name">
                    <label class="auth-label">Value</label>
                    <input type="text" id="auth-apikey-value" class="auth-input" placeholder="API key value">
                    <label class="auth-label">Add to</label>
                    <select id="auth-apikey-in" class="auth-input" style="border-radius:9999px;">
                      <option value="header">Header</option>
                      <option value="query">Query Param</option>
                    </select>
                  </div>

                  <!-- OAuth 2.0 -->
                  <div id="auth-oauth2-fields" class="auth-fields hidden">
                    <label class="auth-label">Grant Type</label>
                    <select id="auth-oauth2-grant" class="auth-input" style="border-radius:9999px;">
                      <option value="client_credentials">Client Credentials</option>
                      <option value="authorization_code">Authorization Code</option>
                      <option value="password">Resource Owner Password</option>
                    </select>
                    <label class="auth-label">Token URL</label>
                    <input type="text" id="auth-oauth2-tokenurl" class="auth-input" placeholder="https://auth.example.com/token">
                    <label class="auth-label">Client ID</label>
                    <input type="text" id="auth-oauth2-clientid" class="auth-input" placeholder="Client ID">
                    <label class="auth-label">Client Secret</label>
                    <input type="password" id="auth-oauth2-clientsecret" class="auth-input" placeholder="Client Secret">
                    <label class="auth-label">Scope</label>
                    <input type="text" id="auth-oauth2-scope" class="auth-input" placeholder="openid profile email">
                  </div>

                  <!-- Digest -->
                  <div id="auth-digest-fields" class="auth-fields hidden">
                    <label class="auth-label">Username</label>
                    <input type="text" id="auth-digest-username" class="auth-input" placeholder="Username">
                    <label class="auth-label">Password</label>
                    <input type="password" id="auth-digest-password" class="auth-input" placeholder="Password">
                  </div>
                </div>
              </div>

              <div class="tab-pane" id="script-pane">
                <textarea id="script-textarea" placeholder="Pre/post request scripts…"></textarea>
              </div>
              <div class="tab-pane" id="assert-pane">
                <textarea id="assert-textarea" placeholder="Assertions…"></textarea>
              </div>
              <div class="tab-pane" id="docs-pane">
                <textarea id="docs-textarea" placeholder="Documentation…"></textarea>
              </div>

            </div>

            <!-- Response Panel -->
            <div class="response-panel">
              <div class="response-meta">
                <span class="response-label">Response</span>
                <span id="response-status" class="response-status"></span>
              </div>
              <div class="res-tab-bar">
                <button class="res-tab active" data-tab="body">Body</button>
                <button class="res-tab" data-tab="headers">Headers</button>
              </div>
              <pre class="res-pane active" id="res-body-pane">Ready to send</pre>
              <div class="res-pane" id="res-headers-pane"></div>
            </div>
          </div>

        </div><!-- /request-editor -->
      </div><!-- /main-area -->

    </div><!-- /bruno-container -->
  </div><!-- /bruno-outer -->

  <!-- ======================================================= -->
  <!-- New Request Modal                                        -->
  <!-- ======================================================= -->
  <div id="modal-new-request" class="modal hidden">
    <div class="modal-content">
      <h3>New Request</h3>
      <input type="text" id="request-name-input" class="modal-input" placeholder="Request name">
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end;">
        <button id="modal-cancel" class="btn-modal-cancel">Cancel</button>
        <button id="modal-create" class="btn-modal-primary">Create</button>
      </div>
    </div>
  </div>

  <!-- ======================================================= -->
  <!-- Environment Management Modal                            -->
  <!-- ======================================================= -->
  <div id="modal-env" class="modal hidden">
    <div class="modal-content env-modal-content">
      <div class="env-modal-header">
        <h3>Environments</h3>
        <button id="env-modal-close" class="btn-icon">✕</button>
      </div>
      <div class="env-modal-body">
        <div class="env-modal-left">
          <div id="env-sidebar-list" class="env-sidebar-list"></div>
          <button id="env-add-btn" class="kv-add-btn" style="margin:8px;">+ New Environment</button>
        </div>
        <div class="env-modal-right">
          <div id="env-no-selection" class="env-empty-state">Select an environment to edit its variables</div>
          <div id="env-editor-area" class="hidden" style="display:flex;flex-direction:column;height:100%;">
            <div class="kv-editor" id="env-vars-editor" style="flex:1;">
              <div class="kv-header">
                <span class="kv-col-check"></span>
                <span class="kv-col-key">Variable</span>
                <span class="kv-col-val">Value</span>
                <span class="kv-col-secret">🔒</span>
                <span class="kv-col-del"></span>
              </div>
              <div class="kv-rows"></div>
              <button id="env-add-var-btn" class="kv-add-btn">+ Add Variable</button>
            </div>
          </div>
        </div>
      </div>
      <div class="env-modal-footer">
        <button id="env-delete-btn" class="btn-danger" style="display:none;">Delete Environment</button>
        <div style="flex:1;"></div>
        <button id="env-save-btn" class="btn-modal-primary" style="display:none;">Save</button>
        <button id="env-modal-cancel" class="btn-modal-cancel">Close</button>
      </div>
    </div>
  </div>

  <script src="bruno.js"></script>
</body>
</html>
