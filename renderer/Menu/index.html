<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none';" />
  <title>Menu</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <button class="menu-row" id="btn-new-tab">
      <svg viewBox="0 0 20 20" fill="none"><path d="M10 5v10M5 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="ml">New Tab</span><span class="sc" data-sc="T"></span>
    </button>
    <button class="menu-row" id="btn-new-window">
      <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/></svg>
      <span class="ml">New Window</span><span class="sc" data-sc="N"></span>
    </button>
    <button class="menu-row" id="btn-new-private">
      <svg viewBox="0 0 20 20" fill="none"><path d="M10 2.5L4 5v4.5c0 3.4 2.5 5.9 6 6.8 3.5-.9 6-3.4 6-6.8V5l-6-2.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      <span class="ml">New Private Window</span><span class="sc" data-sc="⇧N"></span>
    </button>

    <div class="sep"></div>

    <div class="zoom-row">
      <span class="zoom-label">Zoom</span>
      <div class="zoom-controls">
        <button id="zoom-out" title="Zoom out">−</button>
        <button id="zoom-reset" title="Reset zoom"><span id="zoom-level">100%</span></button>
        <button id="zoom-in" title="Zoom in">+</button>
      </div>
    </div>

    <div class="sep"></div>

    <button class="menu-row" id="btn-find">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M13 13l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="ml">Find in Page</span><span class="sc" data-sc="F"></span>
    </button>
    <button class="menu-row" id="btn-print">
      <svg viewBox="0 0 20 20" fill="none"><path d="M6 8V4h8v4M6 15H4v-5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v5h-2M6 12h8v4H6z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      <span class="ml">Print…</span><span class="sc" data-sc="P"></span>
    </button>

    <div class="sep"></div>

    <button class="menu-row" id="btn-history">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 6v4l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="ml">History</span><span class="sc" id="sc-history"></span>
    </button>
    <button class="menu-row" id="btn-bookmarks">
      <svg viewBox="0 0 20 20" fill="none"><path d="M6 3h8a1 1 0 0 1 1 1v13l-5-3-5 3V4a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      <span class="ml">Bookmarks</span><span class="sc" data-sc="⇧O"></span>
    </button>
    <button class="menu-row" id="btn-bookmark-bar">
      <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M3 8h14" stroke="currentColor" stroke-width="1.4"/></svg>
      <span class="ml">Bookmark Bar</span><span id="bookmark-bar-check" class="check"></span>
    </button>

    <div class="sep"></div>

    <button class="menu-row" id="btn-settings">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2.6" stroke="currentColor" stroke-width="1.4"/><path d="M10 3v1.6M10 15.4V17M3 10h1.6M15.4 10H17M5 5l1.1 1.1M13.9 13.9L15 15M5 15l1.1-1.1M13.9 6.1L15 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span class="ml">Settings</span><span class="sc" data-sc=","></span>
    </button>
  </div>
  <script src="menu.js"></script>
</body>
</html>
