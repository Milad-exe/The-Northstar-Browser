<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none';" />
  <title>Ink Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Top Navigation Bar -->
  <div id="utility-bar">
    <!-- Window controls — position/style set by JS based on platform -->
    <div id="window-controls" class="window-controls"></div>

    <div class="nav-start">
      <img class="browser-logo" src="../assets/logo.svg" alt="Ink" width="22" height="22">
    </div>

    <div class="nav-buttons">
      <button id="back-btn" class="nav-btn" title="Back">‹</button>
      <button id="forward-btn" class="nav-btn" title="Forward">›</button>
      <button id="reload-btn" class="nav-btn" title="Reload">↻</button>
    </div>

    <div class="omnibox-wrapper">
      <div class="omnibox">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="10.5" cy="10.5" r="6.5"/>
          <line x1="15.5" y1="15.5" x2="21" y2="21"/>
        </svg>
        <input id="searchBar" placeholder="Search or enter URL" type="text">
      </div>
    </div>

    <!-- Inline pomodoro pill — hidden until focus mode/timer is active -->
    <div id="pomodoro-pill" class="pomodoro-pill hidden" title="Click to manage timer">
      <svg class="pill-ring" viewBox="0 0 28 28" width="28" height="28">
        <circle class="pill-ring-bg"   cx="14" cy="14" r="11"/>
        <circle class="pill-ring-fill" id="pill-ring-fill" cx="14" cy="14" r="11"/>
      </svg>
      <span class="pill-phase-dot" id="pill-phase-dot"></span>
      <span class="pill-time" id="pill-time">25:00</span>
    </div>

    <div class="trailing-icons">
      <!-- Reader mode: hidden until the page looks like an article -->
      <button id="reader-btn" class="icon-btn reader-btn hidden" title="Reader View">
        <svg class="icon-svg" viewBox="0 0 20 20" fill="none">
          <rect x="3" y="4" width="14" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6.5 8h5M6.5 11h7M6.5 13.5h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <!-- Picture-in-Picture: hidden until the active tab plays video -->
      <button id="pip-btn" class="icon-btn pip-btn hidden" title="Picture-in-Picture">
        <svg class="icon-svg" viewBox="0 0 20 20" fill="none">
          <rect x="3" y="4.5" width="14" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="10" y="9" width="5.5" height="4.5" rx="1" fill="currentColor"/>
        </svg>
      </button>
      <!-- Downloads: hidden until the first download of the session -->
      <button id="downloads-btn" class="icon-btn downloads-btn hidden" title="Downloads">
        <svg class="icon-svg" viewBox="0 0 20 20" fill="none">
          <path d="M10 3v8.5M6.5 8.5L10 12l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 15.5h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="downloads-dot"></span>
      </button>
      <!-- Bookmark: filled star when bookmarked, outline when not -->
      <button id="bookmark-btn" class="icon-btn" title="Bookmark">
        <svg class="icon-svg bookmark-outline" viewBox="0 0 20 20" fill="none">
          <path d="M5 3h10a1 1 0 011 1v13l-6-3.5L4 17V4a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <svg class="icon-svg bookmark-filled" viewBox="0 0 20 20" fill="currentColor">
          <path d="M5 3h10a1 1 0 011 1v13l-6-3.5L4 17V4a1 1 0 011-1z"/>
        </svg>
      </button>
      <!-- Focus: clock icon -->
      <button id="focus-btn" class="icon-btn" title="Focus Mode">
        <svg class="icon-svg" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 6v4l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="menu-btn" class="icon-btn menu-btn" title="Menu">
        <svg viewBox="0 0 16 12" width="16" height="12" fill="currentColor">
          <rect y="0" width="16" height="1.5" rx="0.75"/>
          <rect y="5.25" width="16" height="1.5" rx="0.75"/>
          <rect y="10.5" width="16" height="1.5" rx="0.75"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Bookmark Bar -->
  <div id="bookmark-bar" class="bookmark-bar hidden">
    <div id="bookmark-bar-items"></div>
  </div>

  <!-- Tab Bar -->
  <div id="tab-bar">
    <button id="tab-scroll-left" class="tab-scroll-btn" tabindex="-1" aria-label="Scroll tabs left">‹</button>
    <div id="tabs-container"></div>
    <button id="tab-scroll-right" class="tab-scroll-btn" tabindex="-1" aria-label="Scroll tabs right">›</button>
    <div id="tab-actions">
      <button id="new-tab-btn" class="tab-add" tabindex="-1" aria-label="New tab">+</button>
      <button id="new-private-tab-btn" class="tab-add tab-add-private" tabindex="-1" aria-label="New private tab" title="New Private Tab (⌘⇧P)">
        <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M8 1L2 3.5V8c0 3.3 2.5 5.7 6 7 3.5-1.3 6-3.7 6-7V3.5L8 1zm0 6.5h4c-.3 2.2-1.8 4-4 5.1V7.5H4V5l4-1.7V7.5z"/></svg>
      </button>
    </div>
    <div id="private-window-badge" class="private-badge">
      <svg viewBox="0 0 16 16" width="10" height="10" fill="currentColor"><path d="M8 1L2 3.5V8c0 3.3 2.5 5.7 6 7 3.5-1.3 6-3.7 6-7V3.5L8 1zm0 6.5h4c-.3 2.2-1.8 4-4 5.1V7.5H4V5l4-1.7V7.5z"/></svg>
      Private
    </div>
  </div>

  <!-- Content Area -->
  <div id="content-area"></div>

  <!-- Pomodoro Overlay -->
  <div id="pomodoro-overlay" class="pomodoro-overlay hidden">
    <div class="pomodoro-card">
      <div class="pomodoro-phase" id="pomodoro-phase">Focus</div>
      <div class="pomodoro-time" id="pomodoro-time">25:00</div>
      <div class="pomodoro-controls">
        <button id="pomodoro-start" class="pom-btn pom-btn-primary">Start</button>
        <button id="pomodoro-skip"  class="pom-btn">Skip</button>
        <button id="pomodoro-reset" class="pom-btn">Reset</button>
      </div>
      <div class="pomodoro-sessions" id="pomodoro-sessions"></div>
      <button id="pomodoro-close" class="pom-close" title="Close">✕</button>
    </div>
  </div>

  <script src="../../node_modules/dompurify/dist/purify.min.js"></script>
  <script src="../renderer.js"></script>
</body>
</html>
