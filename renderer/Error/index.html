<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none';" />
  <title>Can't reach this page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../themes.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
    }
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }
    .icon {
      font-size: 48px;
      line-height: 1;
      opacity: 0.35;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
    }
    .url {
      font-size: 13px;
      color: var(--text-2);
      word-break: break-all;
      max-width: 480px;
    }
    .detail {
      font-size: 12px;
      color: var(--text-2);
      opacity: 0.7;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    button {
      border: 1px solid var(--border-2);
      background: transparent;
      border-radius: 9999px;
      padding: 8px 20px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: background 0.12s;
    }
    button:hover { background: var(--hover); }
    button.primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    button.primary:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="page">
    <div class="icon">⚠️</div>
    <h1 id="title">Can't reach this page</h1>
    <div class="url" id="url"></div>
    <div class="detail" id="detail"></div>
    <div class="actions">
      <button class="primary" id="btn-retry">Try Again</button>
      <button id="btn-back">Go Back</button>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const failedUrl = params.get('url') || '';
    const code = params.get('code') || '';
    const desc = params.get('desc') || '';

    if (failedUrl) document.getElementById('url').textContent = failedUrl;

    const messages = {
      '-2':   ['No internet connection', 'Check your network connection and try again.'],
      '-3':   ['Host not found', 'The DNS lookup for this site failed.'],
      '-6':   ['Connection refused', 'The site actively refused the connection.'],
      '-7':   ['Timed out', 'The connection took too long to respond.'],
      '-21':  ['Network changed', 'Your network changed while loading. Try again.'],
      '-100': ['No internet', 'There is no internet connection.'],
      '-101': ['Connection refused', 'The site refused the connection.'],
      '-102': ['Connection reset', 'The connection was reset.'],
      '-105': ['Host not found', 'The DNS lookup for this site failed.'],
      '-106': ['Internet disconnected', 'No internet connection is available.'],
      '-109': ['Address unreachable', 'The address is not reachable.'],
      '-118': ['Connection timed out', 'The connection timed out.'],
      '-137': ['Network access denied', 'Your browser does not have network access.'],
      '-300': ['Invalid URL', 'The URL is not valid.'],
      '-310': ['Too many redirects', 'The page has too many redirects.'],
      '-324': ['Empty response', 'The server sent an empty response.'],
      '-501': ['Insecure connection', 'This site uses an insecure connection.'],
    };

    const [title, detail] = messages[code] || ['Can\'t reach this page', desc || 'Something went wrong loading this page.'];
    document.getElementById('title').textContent = title;
    document.getElementById('detail').textContent = detail;
    document.title = title;

    // Use the tab's navigation API (available via preload) instead of window history
    document.getElementById('btn-retry').addEventListener('click', () => {
      if (failedUrl) window.electronAPI.navigateActiveTab(failedUrl);
    });

    document.getElementById('btn-back').addEventListener('click', () => {
      window.electronAPI.activeTabGoBack();
    });
  </script>
</body>
</html>
