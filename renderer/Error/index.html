<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none';" />
  <title>Can't reach this page</title>
  <link rel="stylesheet" href="../styles/ui.css">
  <!-- Styled with Tailwind utilities from ui.css (theme-aware tokens:
       bg-base, text-primary/secondary/tertiary, border-strong, bg-hover…).
       Only the handful of things utilities can't express stay in CSS. -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    button { transition: background 0.12s; }
  </style>
</head>
<body class="h-full bg-base font-sans text-primary">
  <div class="flex h-full select-none flex-col items-center justify-center gap-4 p-10 text-center">
    <div class="leading-none text-tertiary">
      <svg viewBox="0 0 24 24" width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3.5L2.8 19.5h18.4L12 3.5z"/>
        <path d="M12 9.5v4.5M12 16.8v.1"/>
      </svg>
    </div>
    <h1 class="text-[22px] font-semibold" id="title">Can't reach this page</h1>
    <!-- the failed URL is copyable; everything else is UI text -->
    <div class="max-w-[480px] select-text break-all text-[13px] text-secondary" id="url"></div>
    <div class="text-xs text-secondary opacity-70" id="detail"></div>
    <div class="mt-2 flex gap-2.5">
      <button class="cursor-pointer border border-primary bg-primary px-5 py-2 font-sans text-[13px] font-medium text-base hover:opacity-85" id="btn-retry">Try Again</button>
      <button class="cursor-pointer border border-strong bg-transparent px-5 py-2 font-sans text-[13px] font-medium text-primary hover:bg-hover" id="btn-back">Go Back</button>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const failedUrl = params.get('url') || '';
    const code = params.get('code') || '';
    const desc = params.get('desc') || '';

    if (failedUrl) document.getElementById('url').textContent = failedUrl;

    const messages = {
      '-2':   ['No internet connection', 'Check your network connection and try again.'],
      '-3':   ['Host not found', 'The DNS lookup for this site failed.'],
      '-6':   ['Connection refused', 'The site actively refused the connection.'],
      '-7':   ['Timed out', 'The connection took too long to respond.'],
      '-21':  ['Network changed', 'Your network changed while loading. Try again.'],
      '-100': ['No internet', 'There is no internet connection.'],
      '-101': ['Connection refused', 'The site refused the connection.'],
      '-102': ['Connection reset', 'The connection was reset.'],
      '-105': ['Host not found', 'The DNS lookup for this site failed.'],
      '-106': ['Internet disconnected', 'No internet connection is available.'],
      '-109': ['Address unreachable', 'The address is not reachable.'],
      '-118': ['Connection timed out', 'The connection timed out.'],
      '-137': ['Network access denied', 'Your browser does not have network access.'],
      '-300': ['Invalid URL', 'The URL is not valid.'],
      '-310': ['Too many redirects', 'The page has too many redirects.'],
      '-324': ['Empty response', 'The server sent an empty response.'],
      '-501': ['Insecure connection', 'This site uses an insecure connection.'],
    };

    const [title, detail] = messages[code] || ['Can\'t reach this page', desc || 'Something went wrong loading this page.'];
    document.getElementById('title').textContent = title;
    document.getElementById('detail').textContent = detail;
    document.title = title;

    // Use the tab's navigation API (available via preload) instead of window history
    document.getElementById('btn-retry').addEventListener('click', () => {
      if (failedUrl) window.electronAPI.navigateActiveTab(failedUrl);
    });

    document.getElementById('btn-back').addEventListener('click', () => {
      window.electronAPI.activeTabGoBack();
    });
  </script>
</body>
</html>
