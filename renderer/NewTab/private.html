<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none';" />
  <title>Private Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --private-bg:       #f0ebff;
      --private-surface:  #e6deff;
      --private-text:     #180a40;
      --private-text-2:   #6b4da8;
      --private-text-3:   #c4b0e8;
      --private-border:   rgba(110,70,200,0.18);
      --private-accent:   #7c3aed;
      --font: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'Menlo', 'SF Mono', monospace;
    }

    html, body {
      height: 100%; width: 100%;
      font-family: var(--font);
      background: var(--private-bg);
      color: var(--private-text);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    .main-wrapper {
      flex: 1;
      overflow-y: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 40px 20px;
      max-width: 600px;
      width: 100%;
    }

    /* ── Private badge ── */
    .private-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .private-shield {
      width: 48px;
      height: 48px;
      color: var(--private-accent);
      opacity: 0.7;
    }

    .private-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--private-accent);
      border: 1px solid rgba(124,58,237,0.35);
      padding: 3px 10px;
      border-radius: 3px;
    }

    .private-description {
      font-size: 12px;
      color: var(--private-text-2);
      text-align: center;
      max-width: 380px;
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    /* ── Time & Greeting ── */
    .greeting-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .time-display {
      font-size: 96px;
      font-weight: 200;
      letter-spacing: -5px;
      line-height: 1;
      color: var(--private-text);
      font-family: var(--mono);
    }

    .date-text {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--private-text-3);
    }

    /* ── Search ── */
    .search-section {
      width: 100%;
      max-width: 520px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      height: 46px;
      background: transparent;
      border: 1px solid var(--private-border);
      border-radius: 0;
      padding: 0 18px;
      gap: 10px;
      transition: border-color 0.15s;
    }

    .search-bar:focus-within {
      border-color: rgba(124,58,237,0.45);
    }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 14px;
      color: var(--private-text);
      text-align: center;
    }

    .search-bar input::placeholder {
      color: var(--private-text-3);
      text-align: center;
    }

    .search-icon {
      color: var(--private-text-3);
      flex-shrink: 0;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(110,70,200,0.2); }

    @media (max-width: 600px) {
      .time-display { font-size: 64px; letter-spacing: -3px; }
    }
  </style>
</head>
<body>
  <main class="main-wrapper">
    <div class="container">

      <div class="private-header">
        <svg class="private-shield" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2L3 6v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V6l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V13H5V7.58l7-3.11V12.99z"/>
        </svg>
        <span class="private-label">Private</span>
        <p class="private-description">
          Your browsing in this tab won't be saved to history, and cookies won't persist after you close it.
        </p>
      </div>

      <div class="greeting-section">
        <div class="time-display" id="time-display">00:00</div>
        <div class="date-text" id="date-display">LOADING</div>
      </div>

      <div class="search-section">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="10.5" cy="10.5" r="6.5"/>
            <line x1="15.5" y1="15.5" x2="21" y2="21"/>
          </svg>
          <input class="search-input" placeholder="Search privately..." type="text">
        </div>
      </div>

    </div>
  </main>

  <script>
    function formatTime(date) {
      return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
    }

    function formatDate(date) {
      const days   = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
      const months = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
      return days[date.getDay()] + ', ' + months[date.getMonth()] + ' ' + date.getDate();
    }

    function updateTime() {
      const now = new Date();
      const el = document.getElementById('time-display');
      const de = document.getElementById('date-display');
      if (el) el.textContent = formatTime(now);
      if (de) de.textContent = formatDate(now);
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateTime();
      setInterval(updateTime, 10000);

      if (window.electronAPI && window.electronAPI.windowClick) {
        window.addEventListener('click', (e) => {
          window.electronAPI.windowClick({ x: e.clientX, y: e.clientY });
        });
      }

      const searchInput = document.querySelector('.search-input');
      if (searchInput) {
        searchInput.addEventListener('keydown', (e) => {
          if (e.key !== 'Enter') return;
          const query = searchInput.value.trim();
          if (!query) return;
          let url;
          if (query.startsWith('http://') || query.startsWith('https://')) {
            url = query;
          } else if (query.includes('.') && !query.includes(' ')) {
            url = 'https://' + query;
          } else {
            url = 'https://www.google.com/search?q=' + encodeURIComponent(query);
          }
          window.location.href = url;
        });
      }
    });
  </script>
</body>
</html>
