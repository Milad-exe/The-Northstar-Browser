<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none';" />
  <title>New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="main-wrapper">
    <div class="ambient-bg">
      <div class="ambient-blob blob-1"></div>
      <div class="ambient-blob blob-2"></div>
    </div>

    <div class="container">
      <div class="main-content">
        <!-- Logo -->
        <img class="home-logo" src="../assets/logo.svg" alt="Ink">

        <!-- Time & Greeting -->
        <div class="greeting-section">
          <div class="time-display" id="time-display">14:42</div>
          <div>
            <div class="greeting-text" id="greeting-text">Good afternoon, Alex.</div>
            <div class="date-text" id="date-display">MONDAY, JUNE 12</div>
          </div>
        </div>

        <!-- Search Bar -->
        <div class="search-section">
          <div class="search-bar">
            <input class="search-input" placeholder="Search the web..." type="text">
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="newtab.js"></script>
</body>
</html>
