<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none';" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="card" id="card">
    <div class="conn" id="conn"></div>
    <div class="shield" id="shield">
      <div>
        <div class="shield-title">Protections</div>
        <div class="shield-desc" id="shield-desc">Blocking ads &amp; trackers on this site</div>
      </div>
      <label class="toggle"><input type="checkbox" id="shield-toggle"><span class="track"></span></label>
    </div>
    <div class="section">
      <div class="section-title">Permissions</div>
      <div id="perms" class="perms"></div>
    </div>
    <button class="clear" id="clear">Clear cookies and site data</button>
  </div>
  <script src="siteinfo.js"></script>
</body>
</html>
