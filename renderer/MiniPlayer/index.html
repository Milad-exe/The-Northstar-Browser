<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none';" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="card" id="card">

    <!-- ── Compact ─────────────────────────────────────────────── -->
    <div id="compact">
      <div class="top">
        <span class="time" id="c-time">0:00</span>
        <span class="title" id="c-title">Playing media…</span>
        <button class="mini-btn" id="expand" title="Expand">
          <svg viewBox="0 0 20 20" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l6 6-6 6"/><path d="M11 4l6 6-6 6"/></svg>
        </button>
        <button class="mini-btn" id="c-close" title="Hide">
          <svg viewBox="0 0 20 20" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 5l10 10M15 5L5 15"/></svg>
        </button>
      </div>
      <div class="controls">
        <button class="ctl" id="c-toggle" title="Play / Pause"><span class="ic-toggle"></span></button>
        <button class="ctl" id="c-mute" title="Mute / Unmute"><span class="ic-mute"></span></button>
        <button class="ctl goto" id="c-goto" title="Go to tab"><span class="ic-goto"></span></button>
      </div>
    </div>

    <!-- ── Expanded full-width bar ─────────────────────────────── -->
    <div id="expanded" style="display:none">
      <button class="ctl big" id="x-toggle" title="Play / Pause"><span class="ic-toggle"></span></button>
      <img class="art" id="x-art" alt="" style="display:none">
      <div class="track" id="x-track" title="Seek">
        <div class="fill" id="x-fill"></div>
        <span class="t-el" id="x-el">0:00</span>
        <span class="t-title" id="x-title">Playing media…</span>
        <span class="t-rem" id="x-rem">-0:00</span>
      </div>
      <div class="volwrap">
        <button class="ctl" id="x-mute" title="Mute / Unmute"><span class="ic-mute"></span></button>
        <input type="range" id="x-vol" min="0" max="100" value="100" title="Volume">
      </div>
      <button class="ctl" id="x-goto" title="Go to tab"><span class="ic-goto"></span></button>
      <button class="ctl" id="collapse" title="Collapse">
        <svg viewBox="0 0 20 20" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4l-6 6 6 6"/><path d="M9 4l-6 6 6 6"/></svg>
      </button>
      <button class="ctl" id="x-close" title="Hide">
        <svg viewBox="0 0 20 20" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 5l10 10M15 5L5 15"/></svg>
      </button>
    </div>

  </div>

  <!-- Shared icon templates (cloned into .ic-* slots by miniplayer.js) -->
  <template id="tpl-play"><svg viewBox="0 0 20 20" width="15" height="15" fill="currentColor"><path d="M6 3.8v12.4c0 .8.9 1.3 1.6.9l9.4-6.2c.6-.4.6-1.4 0-1.8L7.6 2.9c-.7-.4-1.6.1-1.6.9z"/></svg></template>
  <template id="tpl-pause"><svg viewBox="0 0 20 20" width="15" height="15" fill="currentColor"><rect x="4.5" y="3.5" width="4" height="13" rx="1"/><rect x="11.5" y="3.5" width="4" height="13" rx="1"/></svg></template>
  <template id="tpl-vol"><svg viewBox="0 0 20 20" width="15" height="15" fill="currentColor"><path d="M3.5 7.5v5H7l4 3.5v-12L7 7.5H3.5z"/><path d="M13.5 7a4 4 0 010 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></template>
  <template id="tpl-muted"><svg viewBox="0 0 20 20" width="15" height="15" fill="currentColor"><path d="M3.5 7.5v5H7l4 3.5v-12L7 7.5H3.5z"/><path d="M13 8l4 4M17 8l-4 4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></template>
  <template id="tpl-goto"><svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8 5H5.5A1.5 1.5 0 004 6.5v8A1.5 1.5 0 005.5 16h8a1.5 1.5 0 001.5-1.5V12"/><path d="M11 4h5v5"/><path d="M16 4l-7 7"/></svg></template>

  <script src="miniplayer.js"></script>
</body>
</html>
